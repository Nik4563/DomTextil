<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - ДомТекстиля</title>
    <link rel="stylesheet" href="../Styles/login-styles.css">
</head>
<body>
    <form class="login-form">
        <div class="form-header">
            <h2 class="form-title">Регистрация</h2>
            <button type="button" class="close-btn" onclick="history.back()">x</button>
        </div>

        <div class="form-group">
            <input autofocus type="text" class="form-input" placeholder="Логин" required>
        </div>

        <div class="form-group">
            <input type="text" class="form-input" placeholder="Ваш E-mail" required>
        </div>


        <div class="form-group">
            <input type="password" class="form-input" placeholder="Пароль" required>
        </div>

        <p class="divider-text">Нажимая кнопку "Зарегистрироваться" вы соглашаетесь с нашей <a href="#" class="forgot-password">политикой конфиденциальности.</a></p>

        <button type="submit" class="submit-btn">Зарегистрироваться</button>
    </form>
</body>
</html>
