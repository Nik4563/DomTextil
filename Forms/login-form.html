<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ДомТекстиля</title>
    <link rel="icon" href="../Pictures/logotip (2).png">
    <link rel="stylesheet" href="../Styles/login-styles.css">
</head>
<body>
    <form class="login-form">
        <div class="form-header">
            <h2 class="form-title">Вход</h2>
            <button type="button" class="close-btn" onclick="history.back()">x</button>
        </div>

        <div class="form-group">
            <input autofocus type="text" class="form-input" placeholder="Логин" required>
        </div>

        <div class="form-group">
            <input type="password" class="form-input" placeholder="Пароль" required>
        </div>

        <a href="#" class="forgot-password">Забыли пароль?</a>

        <button type="submit" class="submit-btn">Войти</button>

        <p class="divider-text">Нет аккаунта? Вы можете
            <a href="login-account.html">Зарегистрироваться</a>
        </p>
    </form>
</body>
</html>
